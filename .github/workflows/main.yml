name: Build PhotoBridge IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.2.app

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: |
        cat > project.yml << 'YAML'
        name: PhotoBridge
        options:
          bundleIdPrefix: com.idevicemanager
          deploymentTarget:
            iOS: "15.0"
        targets:
          PhotoBridge:
            type: application
            platform: iOS
            sources:
              - path: PhotoBridge
            info:
              path: PhotoBridge/Info.plist
            settings:
              base:
                PRODUCT_BUNDLE_IDENTIFIER: com.idevicemanager.photobridge
                SWIFT_VERSION: 5.0
                IPHONEOS_DEPLOYMENT_TARGET: 15.0
                CODE_SIGN_STYLE: Automatic
                DEVELOPMENT_TEAM: ""
                CODE_SIGNING_REQUIRED: NO
                CODE_SIGNING_ALLOWED: NO
        YAML
        xcodegen generate

    - name: Build (no signing)
      run: |
        xcodebuild \
          -project PhotoBridge.xcodeproj \
          -scheme PhotoBridge \
          -configuration Release \
          -sdk iphoneos \
          -destination "generic/platform=iOS" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE="" \
          CONFIGURATION_BUILD_DIR=$PWD/build/Release-iphoneos \
          clean build

    - name: Package IPA (unsigned)
      run: |
        mkdir -p Payload
        cp -r build/Release-iphoneos/PhotoBridge.app Payload/
        zip -r PhotoBridge_unsigned.ipa Payload
        rm -rf Payload

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: PhotoBridge_unsigned
        path: PhotoBridge_unsigned.ipa
        retention-days: 90
